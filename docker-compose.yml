version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-agents-stock-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./config:/app/config
    networks:
      - ai-agents-stock-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai-agents-stock-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ai-agents-stock-network

networks:
  ai-agents-stock-network:
    driver: bridge
