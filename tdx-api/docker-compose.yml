services:
  stock-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tdx-stock-web
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - NO_PROXY=*
      - no_proxy=*
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "com.stock.description=TDX Stock Data Query System"
      - "com.stock.version=1.0.0"
